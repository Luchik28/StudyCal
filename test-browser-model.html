<!DOCTYPE html>
<html>
<head>
    <title>TensorFlow.js Model Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
</head>
<body>
    <h1>TensorFlow.js Model Test</h1>
    <div id="output"></div>
    <script>
        async function testModel() {
            const output = document.getElementById('output');
            
            function log(message) {
                console.log(message);
                output.innerHTML += '<p>' + message + '</p>';
            }
            
            try {
                log('Testing TensorFlow.js version: ' + tf.version.tfjs);
                log('Starting model test...');
                
                // Load the model
                log('Loading model...');
                const model = await tf.loadLayersModel('./calendar_event_classification_model/model.json');
                log('Model loaded successfully!');
                
                // Display model info
                log('Model inputs: ' + JSON.stringify(model.inputs.map(input => ({ 
                    name: input.name, 
                    shape: input.shape,
                    dtype: input.dtype
                }))));
                log('Model outputs: ' + JSON.stringify(model.outputs.map(output => ({ 
                    name: output.name, 
                    shape: output.shape,
                    dtype: output.dtype
                }))));
                
                // Test prediction
                log('Testing prediction...');
                const testNameTensor = tf.zeros([1, 15], 'int32');
                const testStartTensor = tf.zeros([1, 4], 'float32');
                const testEndTensor = tf.zeros([1, 4], 'float32');
                
                // Test array format
                log('Testing array input format...');
                const arrayPrediction = model.predict([testNameTensor, testStartTensor, testEndTensor]);
                log('Array prediction successful!');
                log('Category output shape: ' + arrayPrediction[0].shape);
                log('Subcategory output shape: ' + arrayPrediction[1].shape);
                
                // Test object format
                log('Testing object input format...');
                try {
                    const objectPrediction = model.predict({
                        'name_input': testNameTensor.clone(),
                        'start_time_input': testStartTensor.clone(), 
                        'end_time_input': testEndTensor.clone()
                    });
                    log('Object prediction also successful!');
                    log('Category output shape (obj): ' + objectPrediction[0].shape);
                    log('Subcategory output shape (obj): ' + objectPrediction[1].shape);
                    objectPrediction[0].dispose();
                    objectPrediction[1].dispose();
                } catch (objError) {
                    log('Object format failed: ' + objError.message);
                }
                
                // Clean up
                testNameTensor.dispose();
                testStartTensor.dispose();
                testEndTensor.dispose();
                arrayPrediction[0].dispose();
                arrayPrediction[1].dispose();
                
                log('All tests completed successfully!');
                
            } catch (error) {
                log('Test failed: ' + error.message);
                log('Error stack: ' + error.stack);
            }
        }
        
        // Run test when page loads
        testModel();
    </script>
</body>
</html>
