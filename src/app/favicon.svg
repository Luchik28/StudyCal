<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="16" height="16" fill="white"/>
  
  <!-- Calendar background - bright blue -->
  <rect x="1" y="2" width="14" height="13" rx="2" fill="#2563eb"/>
  
  <!-- Calendar header -->
  <rect x="1" y="2" width="14" height="4" rx="2" fill="#1d4ed8"/>
  
  <!-- Calendar rings -->
  <rect x="3" y="0" width="2" height="3" rx="1" fill="#374151"/>
  <rect x="11" y="0" width="2" height="3" rx="1" fill="#374151"/>
  
  <!-- "SC" text -->
  <text x="8" y="5" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="white" text-anchor="middle">SC</text>
  
  <!-- Calendar grid (simplified) -->
  <rect x="2" y="8" width="2" height="1" fill="white"/>
  <rect x="5" y="8" width="2" height="1" fill="white"/>
  <rect x="8" y="8" width="2" height="1" fill="white"/>
  <rect x="11" y="8" width="2" height="1" fill="white"/>
  
  <rect x="2" y="10" width="2" height="1" fill="white"/>
  <rect x="5" y="10" width="2" height="1" fill="white"/>
  <rect x="8" y="10" width="2" height="1" fill="#fbbf24"/>
  <rect x="11" y="10" width="2" height="1" fill="white"/>
  
  <rect x="2" y="12" width="2" height="1" fill="white"/>
  <rect x="5" y="12" width="2" height="1" fill="white"/>
  <rect x="8" y="12" width="2" height="1" fill="white"/>
  
  <!-- AI indicator -->
  <circle cx="13" cy="4" r="1" fill="#10b981"/>
</svg>
