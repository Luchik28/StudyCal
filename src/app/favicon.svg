  <!-- Calendar header -->
  <rect x="2" y="3" width="12" height="3" rx="1.5" fill="#1d4ed8"/>
  
  <!-- Calendar rings -->
  <rect x="5" y="1" width="1" height="3" rx="0.5" fill="#6b7280"/>
  <rect x="10" y="1" width="1" height="3" rx="0.5" fill="#6b7280"/>
  
  <!-- Simple dots for dates -->
  <circle cx="5" cy="8" r="0.8" fill="white"/>
  <circle cx="8" cy="8" r="0.8" fill="white"/>
  <circle cx="11" cy="8" r="0.8" fill="white"/>
  
  <circle cx="5" cy="11" r="0.8" fill="white"/>
  <circle cx="8" cy="11" r="0.8" fill="#fbbf24"/>
