<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar background -->
  <rect x="6" y="8" width="36" height="32" rx="3" fill="#2563eb" stroke="#1d4ed8" stroke-width="1"/>
  
  <!-- Calendar header -->
  <rect x="6" y="8" width="36" height="8" rx="3" fill="#1d4ed8"/>
  
  <!-- Calendar holes -->
  <circle cx="14" cy="5" r="2" fill="#6b7280"/>
  <circle cx="34" cy="5" r="2" fill="#6b7280"/>
  
  <!-- Calendar rings -->
  <rect x="12" y="2" width="4" height="8" rx="2" fill="#6b7280"/>
  <rect x="32" y="2" width="4" height="8" rx="2" fill="#6b7280"/>
  
  <!-- Calendar grid -->
  <g fill="white" opacity="0.9">
    <!-- Week 1 -->
    <rect x="10" y="20" width="3" height="3" rx="1"/>
    <rect x="16" y="20" width="3" height="3" rx="1"/>
    <rect x="22" y="20" width="3" height="3" rx="1"/>
    <rect x="28" y="20" width="3" height="3" rx="1"/>
    <rect x="34" y="20" width="3" height="3" rx="1"/>
    
    <!-- Week 2 -->
    <rect x="10" y="26" width="3" height="3" rx="1"/>
    <rect x="16" y="26" width="3" height="3" rx="1"/>
    <rect x="22" y="26" width="3" height="3" rx="1"/>
    <rect x="28" y="26" width="3" height="3" rx="1"/>
    <rect x="34" y="26" width="3" height="3" rx="1"/>
    
    <!-- Week 3 -->
    <rect x="10" y="32" width="3" height="3" rx="1"/>
    <rect x="16" y="32" width="3" height="3" rx="1"/>
    <rect x="22" y="32" width="3" height="3" rx="1"/>
  </g>
  
  <!-- Highlighted date (today) -->
  <rect x="28" y="32" width="3" height="3" rx="1" fill="#fbbf24"/>
  
  <!-- AI indicator dot -->
  <circle cx="38" cy="12" r="2" fill="#10b981"/>
</svg>
